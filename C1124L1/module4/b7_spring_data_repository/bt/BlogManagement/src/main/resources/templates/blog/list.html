<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Blog List</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f6f8; }
    .container { width: 80%; margin: 30px auto; background: #fff; padding: 20px; border-radius: 8px; }
    h1 { text-align: center; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 12px; border-bottom: 1px solid #ddd; }
    th { background: #2c3e50; color: white; }
    a.btn {
      padding: 6px 12px;
      text-decoration: none;
      border-radius: 4px;
      color: white;
      margin-right: 5px;
      font-size: 14px;
    }
    .detail { background: #3498db; }
    .edit { background: #f39c12; }
    .delete { background: #e74c3c; }
    .add { background: #2ecc71; padding: 10px 16px; display: inline-block; }
    .message { margin-top: 15px; color: green; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <h1>Blog List</h1>

  <a th:href="@{/blogs/add}" class="btn add">➕ Add New Blog</a>

  <div class="message" th:if="${mess}" th:text="${mess}"></div>

  <table>
    <tr>
      <th>Title</th>
      <th>Author</th>
      <th>Description</th>
      <th>Action</th>
    </tr>
    <tr th:each="blog : ${blogList}">
      <td th:text="${blog.title}"></td>
      <td th:text="${blog.author}"></td>
      <td th:text="${blog.description}"></td>
      <td>
        <a th:href="@{/blogs/{id}/detail(id=${blog.id})}" class="btn detail">Detail</a>
        <a th:href="@{/blogs/{id}/edit(id=${blog.id})}" class="btn edit">Update</a>
        <a th:href="@{/blogs/{id}/delete(id=${blog.id})}"
           class="btn delete"
           onclick="return confirm('Are you sure you want to delete this blog?')">
          Delete
        </a>
      </td>
    </tr>
  </table>
</div>

</body>
</html>
