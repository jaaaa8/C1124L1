<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Blog Detail</title>
    <style>
        body { font-family: Arial; background: #f4f6f8; }
        .container { width: 60%; margin: 40px auto; background: white; padding: 30px; border-radius: 8px; }
        h1 { text-align: center; }
        .field { margin-top: 20px; }
        .label { font-weight: bold; color: #555; }
        .value { margin-top: 5px; }
        a { display: block; margin-top: 30px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1 th:text="${blog.title}"></h1>

    <div class="field">
        <div class="label">Author</div>
        <div class="value" th:text="${blog.author}"></div>
    </div>

    <div class="field">
        <div class="label">Description</div>
        <div class="value" th:text="${blog.description}"></div>
    </div>

    <div class="field">
        <div class="label">Content</div>
        <div class="value" th:text="${blog.content}"></div>
    </div>

    <a th:href="@{/blogs}">⬅ Back to list</a>
</div>

</body>
</html>
